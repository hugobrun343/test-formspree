<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Readiness Assessment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
      }
      [data-theme="cupcake"] {
        --color-primary: #5b8def;
        --color-primary-content: #fff;
        --color-secondary: #7ca5f0;
        --color-secondary-content: #fff;
      }
    </style>
  </head>

  <body class="min-h-screen bg-[#e6eefb] flex items-center justify-center px-4 py-12 font-sans antialiased">

    <div class="w-full max-w-xl">

      <!-- Header -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary/15 mb-4">
          <i data-lucide="brain" class="w-7 h-7 text-primary"></i>
        </div>
        <h1 class="text-3xl font-bold tracking-tight text-base-content">Is Your Business AI-Ready?</h1>
        <p class="mt-2 text-base-content/50 text-sm max-w-md mx-auto leading-relaxed whitespace-nowrap">
          Take 1 minute to assess your AI readiness and get insights.
        </p>
      </div>

      <!-- Card -->
      <div class="card bg-base-100 shadow-2xl rounded-3xl border border-base-300/40">
        <div class="card-body px-10 py-10">

          <!-- ── Success ── -->
          <div data-fs-success class="hidden">
            <div class="text-center py-10">
              <div class="bg-success/10 w-20 h-20 rounded-full flex items-center justify-center mx-auto">
                <i data-lucide="check-circle-2" class="w-10 h-10 text-success"></i>
              </div>
              <h2 class="mt-5 text-xl font-semibold text-base-content">Thanks for your answers!</h2>
              <p class="mt-1.5 text-base-content/50 text-sm">We'll get back to you with personalized AI insights.</p>
            </div>
          </div>

          <!-- ── Error ── -->
          <div data-fs-error class="text-error text-sm text-center"></div>

          <!-- ── Form ── -->
          <form id="contact-form" class="space-y-7">

            <!-- Industry -->
            <div>
              <label class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider text-base-content/40 mb-2">
                <i data-lucide="building-2" class="w-3.5 h-3.5"></i> Your industry
              </label>
              <select name="industry" required class="select select-primary w-full rounded-xl" data-fs-field>
                <option value="" disabled selected>Select your industry</option>
                <option value="Finance & Banking">Finance & Banking</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Retail & E-commerce">Retail & E-commerce</option>
                <option value="Manufacturing">Manufacturing</option>
                <option value="Tech & SaaS">Tech & SaaS</option>
                <option value="Education">Education</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="divider my-0 opacity-20"></div>

            <!-- AI Familiarity -->
            <div>
              <label class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider text-base-content/40 mb-3">
                <i data-lucide="gauge" class="w-3.5 h-3.5"></i> AI familiarity level
              </label>
              <input
                type="range"
                name="ai_familiarity"
                min="1" max="5" value="3" step="1"
                class="range range-primary range-sm w-full"
                data-fs-field
                id="familiarity-range"
              />
              <div class="flex justify-between text-[11px] text-base-content/35 mt-1.5 font-medium">
                <span>Beginner</span><span>Curious</span><span>Familiar</span><span>Advanced</span><span>Expert</span>
              </div>
            </div>

            <div class="divider my-0 opacity-20"></div>

            <!-- Use cases -->
            <div>
              <label class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider text-base-content/40 mb-3">
                <i data-lucide="layout-grid" class="w-3.5 h-3.5"></i> AI use cases you're interested in
              </label>
              <div class="grid grid-cols-2 gap-2.5">
                <label class="flex items-center gap-3 px-3.5 py-3 rounded-xl border border-base-300/50 hover:border-primary/40 hover:bg-primary/5 transition-all cursor-pointer has-[:checked]:border-primary has-[:checked]:bg-primary/10">
                  <input type="checkbox" name="use_cases" value="Customer Support" class="checkbox checkbox-primary checkbox-sm rounded-lg" />
                  <span class="flex items-center gap-2 text-sm font-medium"><i data-lucide="headset" class="w-4 h-4 text-base-content/40"></i> Customer Support</span>
                </label>
                <label class="flex items-center gap-3 px-3.5 py-3 rounded-xl border border-base-300/50 hover:border-primary/40 hover:bg-primary/5 transition-all cursor-pointer has-[:checked]:border-primary has-[:checked]:bg-primary/10">
                  <input type="checkbox" name="use_cases" value="Data Analysis" class="checkbox checkbox-primary checkbox-sm rounded-lg" />
                  <span class="flex items-center gap-2 text-sm font-medium"><i data-lucide="bar-chart-3" class="w-4 h-4 text-base-content/40"></i> Data Analysis</span>
                </label>
                <label class="flex items-center gap-3 px-3.5 py-3 rounded-xl border border-base-300/50 hover:border-primary/40 hover:bg-primary/5 transition-all cursor-pointer has-[:checked]:border-primary has-[:checked]:bg-primary/10">
                  <input type="checkbox" name="use_cases" value="Content Generation" class="checkbox checkbox-primary checkbox-sm rounded-lg" />
                  <span class="flex items-center gap-2 text-sm font-medium"><i data-lucide="pen-tool" class="w-4 h-4 text-base-content/40"></i> Content Generation</span>
                </label>
                <label class="flex items-center gap-3 px-3.5 py-3 rounded-xl border border-base-300/50 hover:border-primary/40 hover:bg-primary/5 transition-all cursor-pointer has-[:checked]:border-primary has-[:checked]:bg-primary/10">
                  <input type="checkbox" name="use_cases" value="Process Automation" class="checkbox checkbox-primary checkbox-sm rounded-lg" />
                  <span class="flex items-center gap-2 text-sm font-medium"><i data-lucide="workflow" class="w-4 h-4 text-base-content/40"></i> Process Automation</span>
                </label>
                <label class="flex items-center gap-3 px-3.5 py-3 rounded-xl border border-base-300/50 hover:border-primary/40 hover:bg-primary/5 transition-all cursor-pointer has-[:checked]:border-primary has-[:checked]:bg-primary/10">
                  <input type="checkbox" name="use_cases" value="Sales & Marketing" class="checkbox checkbox-primary checkbox-sm rounded-lg" />
                  <span class="flex items-center gap-2 text-sm font-medium"><i data-lucide="megaphone" class="w-4 h-4 text-base-content/40"></i> Sales & Marketing</span>
                </label>
                <label class="flex items-center gap-3 px-3.5 py-3 rounded-xl border border-base-300/50 hover:border-primary/40 hover:bg-primary/5 transition-all cursor-pointer has-[:checked]:border-primary has-[:checked]:bg-primary/10">
                  <input type="checkbox" name="use_cases" value="Code & Dev Tools" class="checkbox checkbox-primary checkbox-sm rounded-lg" />
                  <span class="flex items-center gap-2 text-sm font-medium"><i data-lucide="code" class="w-4 h-4 text-base-content/40"></i> Code & Dev Tools</span>
                </label>
              </div>
            </div>

            <div class="divider my-0 opacity-20"></div>

            <!-- Team size -->
            <div>
              <label class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider text-base-content/40 mb-3">
                <i data-lucide="users" class="w-3.5 h-3.5"></i> Team size
              </label>
              <div class="grid grid-cols-4 gap-2" id="budget-group">
                <label class="cursor-pointer">
                  <input type="radio" name="team_size" value="1-10" class="hidden budget-radio" required />
                  <div class="budget-card text-center py-3 rounded-xl border border-base-300/50 text-sm font-medium transition-all hover:border-primary/40">
                    1–10<br><span class="text-[10px] opacity-60">Startup</span>
                  </div>
                </label>
                <label class="cursor-pointer">
                  <input type="radio" name="team_size" value="11-50" class="hidden budget-radio" />
                  <div class="budget-card text-center py-3 rounded-xl border border-base-300/50 text-sm font-medium transition-all hover:border-primary/40">
                    11–50<br><span class="text-[10px] opacity-60">SMB</span>
                  </div>
                </label>
                <label class="cursor-pointer">
                  <input type="radio" name="team_size" value="51-200" class="hidden budget-radio" />
                  <div class="budget-card text-center py-3 rounded-xl border border-base-300/50 text-sm font-medium transition-all hover:border-primary/40">
                    51–200<br><span class="text-[10px] opacity-60">Mid-size</span>
                  </div>
                </label>
                <label class="cursor-pointer">
                  <input type="radio" name="team_size" value="200+" class="hidden budget-radio" />
                  <div class="budget-card text-center py-3 rounded-xl border border-base-300/50 text-sm font-medium transition-all hover:border-primary/40">
                    200+<br><span class="text-[10px] opacity-60">Enterprise</span>
                  </div>
                </label>
              </div>
            </div>

            <div class="divider my-0 opacity-20"></div>

            <!-- Readiness -->
            <div>
              <label class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider text-base-content/40 mb-3">
                <i data-lucide="sliders-horizontal" class="w-3.5 h-3.5"></i> Current situation
              </label>
              <div class="space-y-2.5">
                <label class="flex items-center justify-between px-4 py-3.5 rounded-xl border border-base-300/50 cursor-pointer hover:border-primary/40 transition-all">
                  <span class="flex items-center gap-2.5 text-sm font-medium">
                    <i data-lucide="database" class="w-4 h-4 text-base-content/40"></i> We have clean, structured data
                  </span>
                  <input type="checkbox" name="has_data" value="yes" class="toggle toggle-primary toggle-sm" />
                </label>
                <label class="flex items-center justify-between px-4 py-3.5 rounded-xl border border-base-300/50 cursor-pointer hover:border-primary/40 transition-all">
                  <span class="flex items-center gap-2.5 text-sm font-medium">
                    <i data-lucide="shield-check" class="w-4 h-4 text-base-content/40"></i> AI budget is approved
                  </span>
                  <input type="checkbox" name="has_budget" value="yes" class="toggle toggle-secondary toggle-sm" />
                </label>
              </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-full rounded-xl text-base font-semibold shadow-lg shadow-primary/25 mt-1" data-fs-submit-btn>
              <i data-lucide="send" class="w-4 h-4"></i>
              Get My AI Readiness Score
            </button>
          </form>

        </div>
      </div>

      <!-- Footer -->
      <p class="text-center text-[11px] text-base-content/25 mt-6 font-medium">Powered by Formspree · Styled with DaisyUI</p>

    </div>

    <!-- Formspree Ajax SDK -->
    <script>
      const FORMSPREE_FORM_ID = "xykbolyl";

      window.formspree =
        window.formspree ||
        function () {
          (formspree.q = formspree.q || []).push(arguments);
        };
      formspree("initForm", {
        formElement: "#contact-form",
        formId: FORMSPREE_FORM_ID,
      });
    </script>
    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
    <script>
      lucide.createIcons();

      // Budget radio toggle styling
      document.querySelectorAll('.budget-radio').forEach(function (radio) {
        radio.addEventListener('change', function () {
          document.querySelectorAll('.budget-card').forEach(function (card) {
            card.style.borderColor = '';
            card.style.backgroundColor = '';
            card.style.color = '';
          });
          var card = radio.nextElementSibling;
          var s = getComputedStyle(document.documentElement);
          card.style.borderColor = s.getPropertyValue('--color-primary');
          card.style.backgroundColor = s.getPropertyValue('--color-primary');
          card.style.color = '#fff';
        });
      });
    </script>
  </body>
</html>
